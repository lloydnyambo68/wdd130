<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | White Water Rafting</title>

    <meta name="description"
      content="Contact White Water Rafting for bookings, questions, and adventure information. We are here to help you plan your rafting experience.">

    <meta name="author" content="lloyd nyambo">

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="White Water Rafting Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>

        <h1>Contact Us</h1>

        <!-- COMPANY INFO -->
        <section class="contact-info">

            <h2>Company Information</h2>

            <p><strong>Address:</strong> 123 River Road, Adventure City</p>
            <p><strong>Phone:</strong> +263 777 123 456</p>
            <p><strong>Email:</strong> info@whitewaterrafting.com</p>

            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d..." width="100%"
              height="300" loading="lazy" allowfullscreen>
            </iframe>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">

            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="River Guide John">
                <figcaption>John - Lead River Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Manager Sarah">
                <figcaption>Sarah - Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Support Mike">
                <figcaption>Mike - Customer Support</figcaption>
            </figure>

        </section>

        <!-- CONTACT FORM -->
        <section class="contact-form">

            <h2>Send Us a Message</h2>

            <form>

                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <p>Purpose of Message:</p>

                <label>
                    <input type="radio" name="purpose" value="general">
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose" value="suggestion">
                    Website Suggestion
                </label>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5"></textarea>

                <label>
                    <input type="checkbox" name="newsletter">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>

            </form>

        </section>

    </main>

    <footer>

        <p>
            &copy; 2026 White Water Rafting | lloyd nyambo
        </p>

        <nav class="socialmedia">

            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram">
            </a>

            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="Twitter">
            </a>

        </nav>

    </footer>

</body>

</html>
