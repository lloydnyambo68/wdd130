<!DOCTYPE html>

<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML & CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    ```
    <header>
        <h1>HTML & CSS Quiz</h1>
    </header>

    <main>
        <form>

            <div class="form-item">
                <label for="q1">1. What HTML element is used to create a hyperlink?</label>
                <input type="text" id="q1" name="q1">
            </div>

            <div class="form-item">
                <label for="q2">2. Explain the purpose of CSS.</label>
                <textarea id="q2" name="q2" rows="4"></textarea>
            </div>

            <div class="form-item">
                <label for="q3">3. Which CSS property changes the text color?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="font-size">font-size</option>
                    <option value="color">color</option>
                    <option value="background">background</option>
                </select>
            </div>

            <div class="form-item">
                <label for="q4">4. How many heading levels does HTML provide?</label>
                <input type="number" id="q4" name="q4">
            </div>

            <button type="submit">Submit Quiz</button>

        </form>
    </main>

    <footer>
        <p>&copy; 2026 Lloyd Nyambo | WDD130</p>
    </footer>
    ```
