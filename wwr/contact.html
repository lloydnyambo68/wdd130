<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description"
      content="Contact White Water Rafting for bookings, inquiries, and adventure information.">
    <meta name="author" content="Lloyd Nyambo">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Rafting Company Logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <h1>Contact Us</h1>

        <section class="company-info">
            <h2>Company Information</h2>

            <p><strong>Address:</strong> 123 River Road, Adventure Valley</p>
            <p><strong>Phone:</strong> +263 77 123 4567</p>
            <p><strong>Email:</strong> info@whitewaterrafting.com</p>
        </section>

        <section class="map">
            <h2>Find Us</h2>

            <iframe src="https://www.google.com/maps/embed?pb=" width="100%" height="300"
              style="border:0;" allowfullscreen="" loading="lazy">
            </iframe>
        </section>

        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/guide1.jpg" alt="John Smith">
                <figcaption>John Smith - Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/guide2.jpg" alt="Sarah Jones">
                <figcaption>Sarah Jones - Safety Officer</figcaption>
            </figure>

            <figure>
                <img src="images/guide3.jpg" alt="Mike Brown">
                <figcaption>Mike Brown - Trip Coordinator</figcaption>
            </figure>
        </section>

        <section class="contact-form">
            <h2>Send Us a Message</h2>

            <form>

                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <p>Purpose of Message:</p>

                <label>
                    <input type="radio" name="purpose" value="general" checked>
                    General Inquiry
                </label>

                <label>
                    <input type="radio" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label>
                    <input type="radio" name="purpose" value="website">
                    Website Suggestion
                </label>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <label>
                    <input type="checkbox" name="subscribe">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Send Message</button>

            </form>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 White Water Rafting | Lloyd Nyambo</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook">
            </a>

            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="LinkedIn">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
